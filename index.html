    <!-- БЛОК ВЫБОРА РЕГИОНА -->
    <div class="region-selector" role="navigation" aria-label="Выбор региона">

      <!-- Поиск по региону -->
      <div class="region-search-wrap">
        <span class="region-search-icon">🔍</span>
        <input
          id="region-search"
          class="region-search-input"
          type="search"
          placeholder="Найти регион..."
          autocomplete="off"
          aria-label="Поиск по регионам"
        />
        <button class="region-search-clear" id="region-search-clear" aria-label="Очистить поиск" hidden>✕</button>
      </div>

      <!-- Кнопки регионов -->
      <div class="region-buttons" role="tablist" aria-label="Выбор региона" id="region-buttons-list">
        <button class="region-button active" data-region="Пермский край" role="tab">Пермский край</button>
        <button class="region-button" data-region="Республика Татарстан" role="tab">Республика Татарстан</button>

        <button class="region-button" data-region="Ростовская область" role="tab">Ростовская область</button>
        <button class="region-button" data-region="Краснодарский край" role="tab">Краснодарский край</button>
        <button class="region-button" data-region="Красноярский край" role="tab">Красноярский край</button>
        <button class="region-button" data-region="Калужская область" role="tab">Калужская область</button>
        <button class="region-button" data-region="Москва" role="tab">Москва</button>
        <button class="region-button" data-region="Санкт-Петербург" role="tab">Санкт-Петербург</button>
        <button class="region-button" data-region="Приморский край" role="tab">Приморский край</button>
        <button class="region-button" data-region="Калининградская область" role="tab">Калининградская область</button>

      <!-- Кнопка показать все / скрыть -->
      <div class="region-toggle-wrap" id="region-toggle-wrap">
        <button class="region-toggle-btn" id="region-toggle-btn" aria-expanded="false">
          Показать все регионы
          <span class="region-toggle-count" id="region-toggle-count"></span>
          <span class="region-toggle-arrow">▼</span>
        </button>
      </div>

      <!-- Пусто при поиске -->
      <div class="region-no-results" id="region-no-results" hidden>
        Регион не найден
      </div>

    </div>

    <!-- Поиск по специальностям -->
    <div class="search-container">
      <label for="search">Поиск по коду специальности или названию направления</label>
      <input id="search" class="search-input" type="search" placeholder="Например: 09.02.07 или Информатика" />
    </div>
  </header>

  <main>
    <table class="catalog" aria-live="polite">
      <thead>
        <tr>
          <th scope="col">№</th>
          <th scope="col">Каталог специальностей среднего профессионального образования</th>
          <th scope="col">Направления подготовки Номер / наименование специальности</th>
        </tr>
      </thead>
      <tbody id="institutions-body"></tbody>
    </table>

    <div id="empty-state" class="empty-state" hidden>
      По вашему запросу ничего не найдено.
    </div>
  </main>
